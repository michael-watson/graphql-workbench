name: Release

on:
  release:
    types: [published]

jobs:
  build:
    name: Build VSIX (${{ matrix.target }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # All VS Code platforms with a matching node-llama-cpp binary.
        # Alpine (musl libc) and web (native modules) are not supported.
        target:
          - linux-x64
          - linux-arm64
          - linux-armhf
          - darwin-arm64
          - darwin-x64
          - win32-x64
          - win32-arm64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Build monorepo
        run: npm run build

      - name: Package VSIX
        run: npm run package -w packages/graphql-workbench -- --target ${{ matrix.target }}

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: vsix-${{ matrix.target }}
          path: packages/graphql-workbench/*.vsix

  upload:
    name: Upload VSIXes to Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all VSIXes
        uses: actions/download-artifact@v4
        with:
          path: vsix-artifacts
          pattern: vsix-*
          merge-multiple: true

      - name: Upload VSIXes to GitHub Release
        run: gh release upload "${{ github.event.release.tag_name }}" vsix-artifacts/*.vsix
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}

  publish:
    name: Publish to Marketplace
    needs: upload
    runs-on: ubuntu-latest
    steps:
      - name: Download all VSIXes
        uses: actions/download-artifact@v4
        with:
          path: vsix-artifacts
          pattern: vsix-*
          merge-multiple: true

      - name: Publish all platform VSIXes
        run: |
          npm install -g @vscode/vsce
          vsce publish --packagePath $(find . -iname '*.vsix')
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
